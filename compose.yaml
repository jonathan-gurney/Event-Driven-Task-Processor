services:
  app:
    build:
      context: .
    container_name: event-driven-task-processor-app
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    volumes:
      - .:/app
      - node_modules:/app/node_modules
  frontend:
    build:
      context: ./frontend
    container_name: event-driven-task-processor-frontend
    command: npm run dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    volumes:
      - ./frontend:/frontend
      - frontend_node_modules:/frontend/node_modules

volumes:
  node_modules:
  frontend_node_modules:
